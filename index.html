<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>D510 復習ドリル</title>
</head>
<body>
<style>
:root{
  --paper:#f6f7f3; --card:#ffffff; --ink:#232f3a; --sub:#5c6b76;
  --line:#d7ddd3; --ai:#33517e; --ai-soft:#e7edf6;
  --shu:#c8371f; --shu-soft:#faeae6; --figfill:#eceee8; --figline:#8a938c;
}
@media (prefers-color-scheme: dark){:root{
  --paper:#161b21; --card:#1e242c; --ink:#e6e9e2; --sub:#9aa7b0;
  --line:#37414b; --ai:#8fb3e6; --ai-soft:#25303f;
  --shu:#f07a5f; --shu-soft:#3a2621; --figfill:#2a313a; --figline:#6b7681;
}}
:root[data-theme="dark"]{
  --paper:#161b21; --card:#1e242c; --ink:#e6e9e2; --sub:#9aa7b0;
  --line:#37414b; --ai:#8fb3e6; --ai-soft:#25303f;
  --shu:#f07a5f; --shu-soft:#3a2621; --figfill:#2a313a; --figline:#6b7681;
}
:root[data-theme="light"]{
  --paper:#f6f7f3; --card:#ffffff; --ink:#232f3a; --sub:#5c6b76;
  --line:#d7ddd3; --ai:#33517e; --ai-soft:#e7edf6;
  --shu:#c8371f; --shu-soft:#faeae6; --figfill:#eceee8; --figline:#8a938c;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;
  font-size:15px;line-height:1.7}
.wrap{max-width:860px;margin:0 auto;padding:18px 16px 90px}
h1,h2,.utitle{font-family:"Yu Mincho","Hiragino Mincho ProN","MS PMincho",serif}
header.app{display:flex;align-items:baseline;gap:12px;border-bottom:3px double var(--ink);
  padding:10px 0 8px;margin-bottom:18px;flex-wrap:wrap}
header.app h1{font-size:26px;margin:0;letter-spacing:.06em}
header.app .sub{color:var(--sub);font-size:12.5px;letter-spacing:.14em}
.crumb{background:none;border:none;color:var(--ai);font-size:13.5px;cursor:pointer;padding:4px 0;
  text-decoration:underline;text-underline-offset:3px;font-family:inherit}
/* home */
.ucard{background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:18px 20px;margin-bottom:14px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.ucode{font-family:Georgia,serif;font-size:13px;color:var(--sub);letter-spacing:.1em;
  writing-mode:horizontal-tb;border:1px solid var(--line);border-radius:6px;padding:2px 8px}
.utitle{font-size:20px;flex:1;min-width:150px}
.ubtns{display:flex;gap:8px}
button.go{font-family:inherit;font-size:14px;cursor:pointer;border-radius:8px;padding:9px 18px;
  border:1.5px solid var(--ai);background:var(--card);color:var(--ai)}
button.go.test{background:var(--ai);color:var(--card)}
button.go:hover{filter:brightness(1.06)}
/* problems */
.gtitle{font-size:17px;margin:30px 0 4px;padding-left:10px;border-left:5px solid var(--ai)}
.gnote{color:var(--sub);font-size:12.5px;margin:0 0 12px;padding-left:15px}
.prob{background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:16px 18px 14px;margin-bottom:12px;position:relative}
.pq{display:flex;gap:14px;flex-wrap:wrap}
.pq .qt{flex:1;min-width:240px;white-space:pre-line}
.pq .qn{font-weight:700;color:var(--ai)}
.pt{color:var(--sub);font-size:12px;margin-left:6px}
.fg{width:200px;max-width:45vw;flex-shrink:0;align-self:center;color:var(--ink)}
.fields{display:flex;gap:14px 22px;flex-wrap:wrap;margin-top:10px;align-items:center}
.fld{display:flex;align-items:center;gap:6px;font-size:14px}
.fld input{font-family:inherit;font-size:15px;padding:6px 8px;width:110px;
  border:none;border-bottom:1.6px solid var(--ink);background:transparent;color:var(--ink);
  border-radius:0;text-align:center}
.fld input.wide{width:250px;max-width:62vw}
.fld input:focus{outline:none;border-bottom-color:var(--ai);box-shadow:0 2px 0 0 var(--ai)}
.actions{display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap}
button.chk{font-family:inherit;font-size:13.5px;cursor:pointer;border-radius:7px;
  padding:7px 16px;border:1.5px solid var(--ink);background:var(--card);color:var(--ink)}
button.chk:hover{border-color:var(--shu);color:var(--shu)}
.mark{font-size:30px;line-height:1;font-weight:700;min-width:36px}
.mark.ok{color:var(--shu)}
.mark.ng{color:var(--ai)}
details.ex{margin-top:10px;font-size:13.5px;border-top:1px dashed var(--line);padding-top:8px}
details.ex summary{cursor:pointer;color:var(--ai);font-size:13px}
details.ex .body{white-space:pre-line;margin-top:6px;color:var(--sub)}
details.ex .ansv{color:var(--shu);font-weight:700}
/* test bar */
.bar{position:sticky;top:0;z-index:5;background:var(--paper);border-bottom:2px solid var(--ink);
  display:flex;align-items:center;gap:18px;padding:10px 2px;margin-bottom:16px;flex-wrap:wrap}
.bar .tmr{font-family:Georgia,serif;font-variant-numeric:tabular-nums;font-size:24px}
.bar .tmr.low{color:var(--shu)}
.bar .sc{font-size:14px;color:var(--sub)}
.bar .sc b{font-size:20px;color:var(--shu);font-family:Georgia,serif}
button.submit{font-family:inherit;font-size:15px;cursor:pointer;border-radius:8px;
  padding:10px 26px;border:none;background:var(--shu);color:#fff;letter-spacing:.1em}
.resultbox{background:var(--card);border:2px solid var(--shu);border-radius:12px;
  padding:20px 24px;margin:20px 0;text-align:center}
.resultbox .big{font-family:Georgia,serif;font-size:46px;color:var(--shu)}
.resultbox .lbl{color:var(--sub);font-size:13px;letter-spacing:.15em}
.prog{font-size:13.5px;color:var(--sub);margin:4px 0 14px}
.prog b{color:var(--shu);font-size:17px}
/* records */
.rectbl{width:100%;border-collapse:separate;border-spacing:0;font-size:14px;background:var(--card);
  border:1px solid var(--line);border-radius:10px;overflow:hidden}
.rectbl th,.rectbl td{padding:8px 14px;border-bottom:1px solid var(--line);text-align:left}
.rectbl tr:last-child td{border-bottom:none}
.rectbl th{font-size:11.5px;color:var(--sub);letter-spacing:.12em;font-weight:600;background:var(--ai-soft)}
.rectbl td.scr{font-family:Georgia,serif;font-size:19px;color:var(--shu);font-variant-numeric:tabular-nums}
.chip{display:inline-block;font-size:11.5px;border:1px solid var(--line);border-radius:20px;padding:1px 10px;color:var(--sub);background:var(--card)}
.dayrow{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 16px;
  margin-bottom:8px;display:flex;gap:6px 18px;flex-wrap:wrap;align-items:baseline}
.dayrow .d{font-family:Georgia,serif;font-size:14.5px;min-width:78px;font-variant-numeric:tabular-nums}
.dayrow .u{font-size:13.5px}
.dayrow .u b{color:var(--shu)}
.trend{display:flex;gap:10px 26px;flex-wrap:wrap;margin:12px 0 6px}
.trend .tu{display:flex;align-items:center;gap:8px;font-size:13px}
button.mini{font-family:inherit;font-size:12px;cursor:pointer;border-radius:6px;padding:5px 12px;
  border:1px solid var(--line);background:var(--card);color:var(--sub)}
button.mini:hover{color:var(--shu);border-color:var(--shu)}
.empty{color:var(--sub);font-size:13.5px;background:var(--card);border:1px dashed var(--line);
  border-radius:10px;padding:16px;text-align:center}
footer{color:var(--sub);font-size:11.5px;margin-top:40px;border-top:1px solid var(--line);padding-top:10px}
@media (max-width:560px){ .fg{width:170px} header.app h1{font-size:22px} }
@media (prefers-reduced-motion: no-preference){
  .mark{animation:pop .18s ease-out} @keyframes pop{from{transform:scale(.4)}to{transform:scale(1)}}
}
</style>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<pattern id="ht" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
<rect width="6" height="6" fill="var(--figfill)"/>
<line x1="0" y1="0" x2="0" y2="6" stroke="var(--figline)" stroke-width="1.1"/>
</pattern></defs></svg>

<div class="wrap">
<header class="app">
  <h1>D510 復習ドリル</h1>
  <span class="sub">小5算数　類似問題・模擬テスト</span>
  <span style="flex:1"></span>
  <button class="crumb" id="home" hidden>← 単元選択にもどる</button>
</header>
<div id="view"></div>
<footer>円周率はすべて 3.14 とします。答えの入力：複数は「, 」区切り／素因数分解は「2×2×5」／分数は「7/8」／大小は「&lt; = &gt;」／(A, B)の組は「(6,72),(18,24)」。</footer>
</div>

<script>
"use strict";
/* ---------- SVG figure helpers (math coords, y-up; py flips) ---------- */
const R1=v=>Math.round(v*10)/10;
const px=(cx,r,a)=>R1(cx+r*Math.cos(a*Math.PI/180));
const py=(cy,r,a)=>R1(cy-r*Math.sin(a*Math.PI/180));
const ST='stroke="var(--ink)" stroke-width="1.3"';
function wedge(cx,cy,r,a1,a2,fill){
  const la=((a2-a1)%360+360)%360>180?1:0;
  return `<path d="M${cx},${cy} L${px(cx,r,a1)},${py(cy,r,a1)} A${r},${r} 0 ${la} 0 ${px(cx,r,a2)},${py(cy,r,a2)} Z" fill="${fill}" ${ST}/>`;
}
function arc(cx,cy,r,a1,a2){
  const la=((a2-a1)%360+360)%360>180?1:0;
  return `<path d="M${px(cx,r,a1)},${py(cy,r,a1)} A${r},${r} 0 ${la} 0 ${px(cx,r,a2)},${py(cy,r,a2)}" fill="none" ${ST} stroke-width="1.5"/>`;
}
const HT='url(#ht)', WHT='var(--card)';
const txt=(x,y,s,fs=11,anc='middle')=>`<text x="${x}" y="${y}" font-size="${fs}" text-anchor="${anc}" fill="var(--ink)" font-family="inherit">${s}</text>`;
const ln=(x1,y1,x2,y2,d)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" ${ST}${d?' stroke-dasharray="4 3"':''}/>`;
const rc=(x,y,w,h,fill)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill}" ${ST}/>`;
const pg=(pts,fill)=>`<polygon points="${pts.map(p=>p.join(',')).join(' ')}" fill="${fill}" ${ST}/>`;
const sv=(w,h,inner)=>`<svg class="fg" viewBox="0 0 ${w} ${h}" role="img">${inner}</svg>`;

const F={
 circle:(lab,diam)=>sv(170,168, `<circle cx="85" cy="78" r="58" fill="var(--figfill)" ${ST}/>`+
   (diam?ln(27,78,143,78)+txt(85,72,lab):ln(85,78,143,78)+`<circle cx="85" cy="78" r="2" fill="var(--ink)"/>`+txt(114,72,lab))),
 sqCircle:(lab)=>sv(170,168, rc(28,18,114,114,HT)+`<circle cx="85" cy="75" r="57" fill="${WHT}" ${ST}/>`+txt(85,152,lab)),
 semi2:(lab,lab2)=>sv(220,128, wedge(110,100,92,0,180,HT)+wedge(64,100,46,0,180,WHT)+wedge(156,100,46,0,180,WHT)+ln(18,100,202,100)+txt(110,118,lab)+txt(64,94,lab2,10)),
 sector:(ang,lab)=>{const r=68,cx=ang>180?85:60,cy=ang>180?82:118;
   let s=wedge(cx,cy,r,0,ang,'var(--figfill)')+txt(cx+r/2,cy+15,lab);
   const am=ang/2;s+=`<text x="${px(cx,r*0.55,am)}" y="${py(cy,r*0.55,am)+4}" font-size="11" text-anchor="middle" fill="var(--ink)">${ang}°</text>`;
   return sv(170,ang>180?168:150,s);},
 sqQuarter:(lab)=>sv(170,160, rc(30,18,112,112,HT)+wedge(30,130,112,0,90,WHT)+`<path d="M30,18 h112 v112" fill="none" ${ST}/>`+txt(86,150,lab)),
 segment:(lab,square)=>{let s=wedge(30,130,110,0,90,HT)+pg([[30,130],[140,130],[30,20]],WHT);
   if(square)s+=`<rect x="30" y="20" width="110" height="110" fill="none" ${ST}/>`+ln(140,130,30,20);
   return sv(170,160,s+txt(86,150,lab));},
 leaf:(lab)=>{const d=`M140,130 A110,110 0 0 0 30,20 A110,110 0 0 0 140,130 Z`;
   return sv(170,160,`<path d="${d}" fill="${HT}" ${ST}/>`+`<rect x="30" y="20" width="110" height="110" fill="none" ${ST}/>`+txt(86,150,lab));},
 rectSemi:(wl,hl)=>sv(230,140, rc(20,20,180,90,HT)+wedge(110,110,90,0,180,WHT)+txt(110,128,wl)+txt(212,70,hl,10)),
 semiTri:(lab)=>sv(230,132, wedge(115,105,92,0,180,HT)+pg([[23,105],[207,105],[115,13]],WHT)+txt(115,124,lab)),
 semiPath:(ab,ac)=>{const A=20,B=200,c=A+(B-A)*ac/ab,r1=(c-A)/2,r2=(B-c)/2;
   let s=ln(A,78,B,78)+arc(110,78,90,0,180)+arc(A+r1,78,r1,180,360)+arc(c+r2,78,r2,180,360);
   [[A,'A'],[c,'C'],[B,'B']].forEach(p=>{s+=`<circle cx="${p[0]}" cy="78" r="2" fill="var(--ink)"/>`+txt(p[0],72,p[1],10)});
   s+=txt(110,-2+14,'イ',11)+txt(A+r1,78+r1+13,'ロ',11)+txt(c+r2,78+r2+13,'ハ',11);
   return sv(220,150,s);},
 semiUp:(lab)=>{const A=20,B=200;let s=ln(A,115,B,115)+arc(110,115,90,0,180)+arc(80,115,60,0,180)+arc(170,115,30,0,180);
   s+=txt(A,130,'A',10)+txt(B,130,'B',10)+txt(110,131,lab);return sv(220,140,s);},
 ring:(ang,fr,li,lo)=>{const r=86,cx=ang>100?110:40,cy=120;
   let s=wedge(cx,cy,r,0,ang,HT)+wedge(cx,cy,r*fr,0,ang,WHT);
   s+=txt(cx+r*fr/2,cy+14,li,10)+txt(cx+r*fr+(r-r*fr)/2,cy+14,lo,10);
   const am=ang/2;s+=`<text x="${px(cx,r*fr*0.5,am)}" y="${py(cy,r*fr*0.5,am)+4}" font-size="10.5" text-anchor="middle" fill="var(--ink)">${ang}°</text>`;
   return sv(ang>100?225:150,150,s);},
 polySec:(kind,lab)=>{
   let pts,r,W=210,H=180;
   if(kind==='tri'){pts=[[55,140],[165,140],[125,62]];r=38;}
   else if(kind==='quad'){pts=[[55,140],[160,132],[148,62],[72,70]];r=33;}
   else{const c=[105,100],rr=52;pts=[];for(let i=0;i<5;i++){const a=234+i*72;pts.push([px(c[0],rr,a),py(c[1],rr,a)])}r=30;}
   let s='';const n=pts.length;
   for(let i=0;i<n;i++){const v=pts[i],p=pts[(i-1+n)%n],q=pts[(i+1)%n];
     const ang=(dx,dy)=>Math.atan2(-(dy),dx)*180/Math.PI;
     s+=wedge(v[0],v[1],r,ang(p[0]-v[0],p[1]-v[1]),ang(q[0]-v[0],q[1]-v[1]),HT);}
   s+=pg(pts,WHT);
   const v0=pts[0];s+=ln(v0[0],v0[1],v0[0]-r*0.7,v0[1]+r*0.7)+`<rect x="${v0[0]-r*0.9-16}" y="${v0[1]+r*0.9-2}" width="34" height="13" fill="var(--card)"/>`+txt(v0[0]-r*0.8,v0[1]+r*1.05,lab,10);
   return sv(W,H,s);},
 barn:(bw,bh,L,wl,hl,rl)=>{const s=118/(2*L),ox=105,oy=95;
   const M=(x,y)=>[R1(ox+s*x),R1(oy-s*y)];const c=M(bw,0);
   let g=wedge(c[0],c[1],s*L,-180,90,HT);
   if(L>bh){const t=M(bw,bh);g+=wedge(t[0],t[1],s*(L-bh),90,180,HT);}
   if(L>bw){const o=M(0,0);g+=wedge(o[0],o[1],s*(L-bw),180,270,HT);}
   const a=M(0,bh);g+=rc(a[0],a[1],s*bw,s*bh,WHT);
   g+=txt(ox+s*bw/2,oy-s*bh/2+4,'小屋',9.5);
   g+=`<rect x="${ox+s*bw/2-16}" y="${oy-s*bh-16}" width="32" height="13" fill="var(--card)"/>`+txt(ox+s*bw/2,oy-s*bh-6,wl,9.5);
   g+=txt(ox-s*bw-8,oy-s*bh/2+3,hl,9.5);
   g+=`<circle cx="${c[0]}" cy="${c[1]}" r="2.6" fill="var(--ink)"/>`+ln(c[0],c[1],px(c[0],s*L,-40),py(c[1],s*L,-40),1);
   g+=`<rect x="${px(c[0],s*L*0.55,-40)-17}" y="${py(c[1],s*L*0.55,-40)+2}" width="36" height="13" fill="var(--card)"/>`+txt(px(c[0],s*L*0.55,-40)+1,py(c[1],s*L*0.55,-40)+12,rl,9.5);
   return sv(230,200,g);},
 windSq:(sd,L,sl,ll)=>{const s=95/L,ox=112,oy=112;const S=s*sd;
   const cs=[[0,0],[0,S],[S,S],[S,0]],th=[[90,180],[0,90],[270,360],[180,270]];
   let g='';for(let i=0;i<4;i++){const r=s*L-i*S;if(r>0.5)g+=wedge(ox+cs[i][0],oy-cs[i][1],r,th[i][0],th[i][1],HT);}
   g+=rc(ox,oy-S,S,S,WHT)+txt(ox+S/2,oy-S/2+4,sl,9.5);
   g+=ln(ox,oy,ox-s*L,oy)+`<circle cx="${ox-s*L}" cy="${oy}" r="2.4" fill="var(--ink)"/>`;
   g+=`<rect x="${ox-s*L/2-19}" y="${oy-16}" width="40" height="13" fill="var(--card)"/>`+txt(ox-s*L/2,oy-6,ll,9.5);
   g+=`<path d="M${ox-s*L},${oy-8} Q${ox-s*L-14},${oy-s*L*0.5} ${ox-s*L*0.88},${oy-s*L*0.55}" fill="none" ${ST} marker-end="url(#ah)"/>`;
   return sv(230,208,'<defs><marker id="ah" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ink)"/></marker></defs>'+g);},
 windTri:(sd,L,sl,ll)=>{const s=88/L,ox=108,oy=140;const S=s*sd,h=S*Math.sqrt(3)/2;
   const T0=[ox,oy],T1=[ox+S,oy],T2=[ox+S/2,oy-h];
   let g=wedge(T0[0],T0[1],s*L,60,180,HT);
   if(L-sd>0.5)g+=wedge(T2[0],T2[1],s*(L-sd),-60,60,HT);
   if(L-2*sd>0.5)g+=wedge(T1[0],T1[1],s*(L-2*sd),180,300,HT);
   g+=pg([T0,T1,T2],WHT);
   g+=`<rect x="${ox+S/2-16}" y="${oy+4}" width="32" height="13" fill="var(--card)"/>`+txt(ox+S/2,oy+14,sl,9.5);
   g+=ln(ox,oy,ox-s*L,oy)+`<circle cx="${ox-s*L}" cy="${oy}" r="2.4" fill="var(--ink)"/>`;
   g+=`<rect x="${ox-s*L/2-21}" y="${oy-16}" width="44" height="13" fill="var(--card)"/>`+txt(ox-s*L/2,oy-6,ll,9.5);
   return sv(230,200,g);},
 dogSq:(sd,L,sl,ll)=>{const s=82/L,ox=105,oy=105;const S=s*sd,LL=s*L;
   let g=wedge(ox,oy,LL,90,360,HT);
   if(L>sd){g+=wedge(ox+S,oy,LL-S,0,90,HT)+wedge(ox,oy-S,LL-S,0,90,HT);}
   g+=rc(ox,oy-S,S,S,WHT)+txt(ox+S/2,oy-S*0.55,'さく',9)+txt(ox+S/2,oy-S*0.18,sl,9);
   g+=`<circle cx="${ox}" cy="${oy}" r="3" fill="var(--ink)"/>`+ln(ox,oy,px(ox,LL,225),py(oy,LL,225),1);
   g+=`<rect x="${px(ox,LL*0.55,225)-14}" y="${py(oy,LL*0.55,225)+3}" width="28" height="13" fill="var(--card)"/>`+txt(px(ox,LL*0.55,225),py(oy,LL*0.55,225)+13,ll,9.5);
   return sv(215,205,g);},
 dogTri:(sd,L,sl,ll)=>{const s=80/L,ox=100,oy=98;const S=s*sd,LL=s*L,h=S*Math.sqrt(3)/2;
   const T1=[ox+S,oy],T2=[ox+S/2,oy-h];
   let g=wedge(ox,oy,LL,60,360,HT);
   if(L>sd){g+=wedge(T1[0],T1[1],LL-S,0,120,HT)+wedge(T2[0],T2[1],LL-S,60,180,HT);}
   g+=pg([[ox,oy],T1,T2],WHT)+txt(ox+S/2,oy-h/3+3,'さく',9);

/* ---------- answer checking ---------- */
function nums(s){const m=(s||'').replace(/[，、]/g,',').match(/\d+(?:\.\d+)?/g);return m?m.map(Number):[];}
function eqList(a,b){if(a.length!==b.length)return false;const x=[...a].sort((p,q)=>p-q),y=[...b].sort((p,q)=>p-q);return x.every((v,i)=>Math.abs(v-y[i])<0.005);}
function checkField(input,ans){
  const got=nums(input);
  if(Array.isArray(ans))return eqList(got,ans);
  if(ans.o){ if(got.length!==ans.o.length)return false; return ans.o.every((v,i)=>Math.abs(v-got[i])<0.005); }
  if(ans.t){ const nm=s=>(s||'').replace(/[\s　]/g,'').replace(/＜/g,'<').replace(/＞/g,'>').replace(/[＝≒]/g,'=').replace(/[≦≤]/g,'<').replace(/[≧≥]/g,'>'); return nm(input)===ans.t; }
  if(ans.p){ if(got.length!==ans.p.length*2)return false;
    const gp=[];for(let i=0;i<got.length;i+=2)gp.push([got[i],got[i+1]].sort((a,b)=>a-b));
    gp.sort((a,b)=>a[0]-b[0]);
    const ep=ans.p.map(q=>[...q].sort((a,b)=>a-b)).sort((a,b)=>a[0]-b[0]);
    return ep.every((e,i)=>e[0]===gp[i][0]&&e[1]===gp[i][1]); }
  return false;
}
function fmtAns(a){
  if(Array.isArray(a))return a.join(', ');
  if(a.d)return a.d;
  if(a.o)return a.o.join('/');
  if(a.t)return a.t;
  return a.p.map(q=>'('+q.join(', ')+')').join(', ');
}

  {q:'底面の半径5cm、高さ6cmの円柱の体積と表面積を求めなさい。（円周率3.14）',fig:()=>F.solidCyl('半径5cm','6cm'),f:[['体積','cm³',[471]],['表面積','cm²',[345.4]]],ex:'体積25×3.14×6＝471、表面積(50+60)×3.14＝345.4'}]},
 {g:'⑤ 水面の高さをそろえる', p:[
  {q:'底面6cm×10cmの容器Aに水が深さ12cm入っていて、底面6cm×5cmの容器Bは空です。AからBに水を移して水面の高さをそろえました。\n(1) 水面の高さは何cm？　(2) 水を何cm³移した？',fig:()=>F.tank('容器A','12cm','水',0.6),f:[['(1)','cm',[8]],['(2)','cm³',[240]]],ex:'水の量6×10×12＝720、底面の合計60+30＝90、高さ720÷90＝8\n移した水＝6×5×8＝240cm³'}]},
 {g:'⑥ おもりをしずめる', p:[
  {q:'底面20cm×15cmの水そうに水が深さ10cm入っています。ある物体を完全にしずめると水の深さは14cmになりました。この物体の体積は？',fig:()=>F.tank('底面20×15','10cm','水',0.5),f:[['答え','cm³',[1200]]],ex:'上がった分＝底面×上がった高さ＝20×15×(14−10)＝1200cm³'},
  {q:'底面30cm×16cmの水そうに水が深さ12cm入っています。体積960cm³の物体を完全にしずめると、水の深さは何cmになりますか。',f:[['答え','cm',[14]]],ex:'上がる高さ＝960÷(30×16)＝2cm → 12+2＝14cm'}]},
 {g:'⑦ 棒を入れる', p:[
  {q:'底面20cm×10cm・高さ24cmの容器に水が深さ12cm入っています。底面4cm×5cmの棒を、立てたまま1本ずつ入れます（棒は水面より高い）。\n(1) 棒を2本入れると水の深さは？　(2) 深さが20cmになるのは何本？　(3) 水がこぼれ始めるのは何本目？',fig:()=>F.tankRod('20cm','24cm'),f:[['(1)','cm',[15]],['(2)','本',[4]],['(3)','本目',[6]]],ex:'水の量＝200×12＝2400、棒1本の底面＝20\n(1) 2400÷(200−40)＝15cm\n(2) 深さ20→水の底面2400÷20＝120、うまる80÷20＝4本\n(3) 深さ24→底面100、うまる100÷20＝5本でいっぱい直前 → 6本目でこぼれる'}]},
 {g:'⑧ 棒を抜く', p:[
  {q:'底面30cm×12cmの容器に、底面10cm×12cmの棒が立って入っています。棒を取り出すと水の深さは20cmになりました。取り出す前の水の深さは？',fig:()=>F.tankRod('30cm','—'),f:[['答え','cm',[30]]],ex:'水の量＝30×12×20＝7200、棒があると底面は360−120＝240、7200÷240＝30cm'},
  {q:'底面40cm×20cmの容器に、底面20cm×10cmの棒が立って入っています。棒を取り出したら水の深さが6cm小さくなりました。取り出す前の水の深さは？',f:[['答え','cm',[24]]],ex:'棒あり底面600、棒なし800。600×D＝800×(D−6) → D＝24cm'}]},
 {g:'⑨ 重ねて置く（発展）', p:[
  {q:'高さ50cmの容器に水が入っています。同じ直方体のおもり（10cm×5cm×4cm）を底面と平行に1個ずつ積み重ねます。3個入れると水面は底から16cm、4個入れると16.8cmになりました。\n(1) 容器の底面積は？　(2) 入っている水の量は？　(3) 5個目を入れると水面は底から何cm？',f:[['(1)','cm²',[250]],['(2)','cm³',[3400]],['(3)','cm',[17]]],ex:'(1) おもり1個(体積200)で水面が0.8上がった→底面200÷0.8＝250\n(2) 250×16−200×3＝3400cm³\n(3) 全部は沈まない→3400÷(250−50)＝17cm'}]}
],
test:{min:30,p:[
  {q:'底面の半径3cm、高さ8cmの円柱の体積と表面積を求めなさい。（円周率3.14）',pt:20,fig:()=>F.solidCyl('半径3cm','8cm'),f:[['体積','cm³',[226.08]],['表面積','cm²',[207.24]]],ex:'体積9×3.14×8＝226.08、表面積(18+48)×3.14＝207.24'},
  {q:'たて8cm・横6cm・高さ10cmの直方体の体積と表面積を求めなさい。',pt:15,fig:()=>F.solidBox('横6cm','8cm','10cm'),f:[['体積','cm³',[480]],['表面積','cm²',[376]]],ex:'体積480、表面積2×(48+80+60)＝376'},
  {q:'底面が1辺6cmの正方形、高さ9cmの四角すいの体積を求めなさい。',pt:10,f:[['答え','cm³',[108]]],ex:'6×6×9×1/3＝108cm³'},
  {q:'底面10cm×10cmの容器Aに水が深さ7cm、底面10cm×4cmの容器Bは空です。AからBに移して水面をそろえると、水面の高さは何cm？',pt:15,f:[['答え','cm',[5]]],ex:'水の量700、底面の合計100+40＝140、700÷140＝5cm'},
  {q:'底面25cm×12cmの水そうに水が深さ10cm入っています。体積600cm³の物体をしずめると水の深さは何cm？',pt:10,f:[['答え','cm',[12]]],ex:'上がる＝600÷(25×12)＝2 → 12cm'},
  {q:'底面25cm×10cm・高さ20cmの容器に水が深さ12cm。底面5cm×5cmの棒を立てて入れます。\n(1) 2本入れると水の深さは？　(2) 水がこぼれ始めるのは何本目？',pt:15,fig:()=>F.tankRod('25cm','20cm'),f:[['(1)','cm',[15]],['(2)','本目',[5]]],ex:'水の量250×12＝3000、棒底面25\n(1) 3000÷(250−50)＝15cm\n(2) 深さ20→底面150、うまる100÷25＝4本でいっぱい → 5本目でこぼれる'},
  {q:'1辺8cmの立方体の体積と表面積を求めなさい。',pt:15,fig:()=>F.solidCube('8cm'),f:[['体積','cm³',[512]],['表面積','cm²',[384]]],ex:'体積8×8×8＝512、表面積8×8×6＝384'}]}
}];

/* ---------- study log (localStorage) ---------- */
function loadLog(){try{return JSON.parse(localStorage.getItem('drillLog'))||{t:[],p:{}};}catch(e){return {t:[],p:{}};}}
function saveLog(L){localStorage.setItem('drillLog',JSON.stringify(L));}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const mdd=s=>(+s.slice(5,7))+'/'+(+s.slice(8,10));
function logPractice(code,pid,ok){
  const L=loadLog(),d=today();
  const day=L.p[d]||(L.p[d]={});
  const e=day[code]||(day[code]={a:[],c:[]});
  if(!e.a.includes(pid))e.a.push(pid);
  const ci=e.c.indexOf(pid);
  if(ok&&ci<0)e.c.push(pid); if(!ok&&ci>=0)e.c.splice(ci,1);
  saveLog(L);
}
let recIdx=null;
function logTest(code,score){
  const L=loadLog();
  if(recIdx!==null&&L.t[recIdx]&&L.t[recIdx].u===code){L.t[recIdx].s=score;L.t[recIdx].d=today();}
  else{L.t.push({d:today(),u:code,s:score});recIdx=L.t.length-1;}
  saveLog(L);
}
function spark(scores){
  if(!scores.length)return '';
  const w=Math.max(40,scores.length*18),h=34;
  const X=i=>scores.length===1?w/2:6+i*(w-12)/(scores.length-1);
  const Y=s=>h-5-(s/100)*(h-10);
  let g=`<line x1="0" y1="${Y(100)}" x2="${w}" y2="${Y(100)}" stroke="var(--line)" stroke-width="1" stroke-dasharray="2 3"/>`;
  if(scores.length>1)g+=`<polyline points="${scores.map((s,i)=>X(i)+','+Y(s)).join(' ')}" fill="none" stroke="var(--ai)" stroke-width="1.6"/>`;
  scores.forEach((s,i)=>{g+=`<circle cx="${X(i)}" cy="${Y(s)}" r="${i===scores.length-1?3.4:2.2}" fill="${i===scores.length-1?'var(--shu)':'var(--ai)'}"/>`});
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" role="img" aria-label="得点の推移"></svg>`.replace('></svg>','>'+g+'</svg>');
}
const uname=code=>{const u=U.find(x=>x.code===code);return u?u.name:code;};

/* ---------- rendering ---------- */
const V=document.getElementById('view'), HOME=document.getElementById('home');
let timerId=null;
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function stopTimer(){if(timerId){clearInterval(timerId);timerId=null;}}
HOME.onclick=()=>{stopTimer();home();};

function home(){
  HOME.hidden=true;
  let h=U.map((u,i)=>{
    const np=u.practice.reduce((a,g)=>a+g.p.length,0);
    const best=localStorage.getItem('best'+u.code);
    return `<div class="ucard"><span class="ucode">${u.code}</span>
      <span class="utitle">${u.name}</span>
      <span class="ubtns">
        <button class="go" onclick="practice(${i})">練習（${np}問）</button>
        <button class="go test" onclick="test(${i})">模擬テスト${best?`（最高 ${best}点）`:''}</button>
      </span></div>`;
  }).join('');
  const L=loadLog();
  const days=Object.keys(L.p).length, nt=L.t.length;
  h+=`<div class="ucard"><span class="ucode">きろく</span>
    <span class="utitle">学習記録</span>
    <span style="font-size:12.5px;color:var(--sub)">練習した日 ${days}日　テスト ${nt}回</span>
    <span class="ubtns"><button class="go" onclick="records()">記録を見る</button></span></div>`;
  V.innerHTML=h;
}

function records(){
  stopTimer();HOME.hidden=false;
  const L=loadLog();
  let h='<h2 style="margin:4px 0 14px">学習記録</h2>';
  /* --- test scores --- */
  h+='<div class="gtitle">模擬テストの成績</div>';
  if(!L.t.length){h+='<p class="empty">まだテストの記録がありません。「採点する」を押すと自動で記録されます。</p>';}
  else{
    h+='<div class="trend">'+U.map(u=>{
      const sc=L.t.filter(t=>t.u===u.code).map(t=>t.s);
      return sc.length?`<span class="tu"><span class="chip">${u.name}</span>${spark(sc)}<b style="color:var(--shu);font-family:Georgia,serif">${Math.max(...sc)}</b><span style="color:var(--sub);font-size:11px">最高</span></span>`:'';
    }).join('')+'</div>';
    const rows=[...L.t].reverse().map(t=>
      `<tr><td style="font-variant-numeric:tabular-nums">${mdd(t.d)}</td><td><span class="chip">${uname(t.u)}</span></td><td class="scr">${t.s}<span style="font-size:12px;color:var(--sub)"> /100</span></td></tr>`).join('');
    h+=`<table class="rectbl"><tr><th>日付</th><th>単元</th><th>点数</th></tr>${rows}</table>`;
  }
  /* --- practice days --- */
  h+='<div class="gtitle" style="margin-top:34px">練習した日</div>';
  const days=Object.keys(L.p).sort().reverse();
  if(!days.length){h+='<p class="empty">まだ練習の記録がありません。練習問題で「答え合わせ」を押すと自動で記録されます。</p>';}
  else{
    h+=days.map(d=>{
      const us=Object.entries(L.p[d]).map(([code,e])=>
        `<span class="u">${uname(code)}　<b>${e.c.length}</b>問正解 / ${e.a.length}問</span>`).join('');
      return `<div class="dayrow"><span class="d">${mdd(d)}</span>${us}</div>`;
    }).join('');
  }
  h+='<p style="margin-top:26px"><button class="mini" onclick="clearLog()">記録をすべて消す</button></p>';
  V.innerHTML=h;window.scrollTo(0,0);
}
function clearLog(){
  if(!confirm('学習記録（練習の記録・テストの成績・最高点）をすべて消します。よろしいですか？'))return;
  localStorage.removeItem('drillLog');
  U.forEach(u=>localStorage.removeItem('best'+u.code));
  records();
}

function fieldHTML(uid,pid,fid,f){
  const wide=f[3];
  return `<label class="fld">${f[0]?esc(f[0]):''}<input id="in-${uid}-${pid}-${fid}" class="${wide?'wide':''}" inputmode="text" autocomplete="off">${f[1]}</label>`;
}
function probHTML(uid,pid,p,num,showPt){
  const fig=p.fig?p.fig():'';
  return `<div class="prob" id="pb-${uid}-${pid}">
    <div class="pq"><div class="qt"><span class="qn">${num}</span>　${esc(p.q)}${showPt&&p.pt?`<span class="pt">（${p.pt}点）</span>`:''}</div>${fig}</div>
    <div class="fields">${p.f.map((f,fi)=>fieldHTML(uid,pid,fi,f)).join('')}</div>
    <div class="actions"><button class="chk" onclick="grade('${uid}',${pid})">答え合わせ</button><span class="mark" id="mk-${uid}-${pid}"></span></div>
    <details class="ex" id="ex-${uid}-${pid}" hidden><summary>解説を見る</summary>
      <div class="body"><span class="ansv">答え：${p.f.map(f=>(f[0]?f[0]+' ':'')+fmtAns(f[2])+(f[1]||'')).join('　')}</span>\n${esc(p.ex||'')}</div></details>
  </div>`;
}
let FLAT={};
function grade(uid,pid){
  const p=FLAT[uid][pid];
  let ok=true;
  p.f.forEach((f,fi)=>{const el=document.getElementById(`in-${uid}-${pid}-${fi}`);
    const good=checkField(el.value,f[2]); if(!good)ok=false;
    el.style.borderBottomColor=good?'var(--shu)':'var(--ai)';});
  const mk=document.getElementById(`mk-${uid}-${pid}`);
  mk.textContent=ok?'○':'×'; mk.className='mark '+(ok?'ok':'ng');
  document.getElementById(`ex-${uid}-${pid}`).hidden=false;
  p._ok=ok;
  const pr=document.getElementById('prg');
  if(pr){const all=Object.values(FLAT[uid]);pr.innerHTML=`正解 <b>${all.filter(x=>x._ok).length}</b> ／ ${all.length}問`;}
  if(uid[0]==='p')logPractice(U[+uid.slice(1)].code,pid,ok);
  if(uid[0]==='t')updateScore(uid);
  return ok;
}
function practice(i){
  stopTimer();HOME.hidden=false;
  const u=U[i],uid='p'+i;FLAT[uid]={};let n=0;
  let h=`<h2 style="margin:4px 0 2px">${u.code}　${u.name}　<span style="font-size:14px;color:var(--sub)">類似問題（練習）</span></h2><p class="prog" id="prg">正解 <b>0</b> ／ ${u.practice.reduce((a,g)=>a+g.p.length,0)}問</p>`;
  u.practice.forEach(g=>{
    h+=`<div class="gtitle">${g.g}</div><p class="gnote">1問ずつ「答え合わせ」を押すと○×と解説が出ます</p>`;
    g.p.forEach(p=>{FLAT[uid][n]=p;p._ok=false;h+=probHTML(uid,n,p,'問'+(n+1));n++;});
  });
  V.innerHTML=h;window.scrollTo(0,0);
}
function updateScore(uid){
  const i=+uid.slice(1),u=U[i];
  const got=u.test.p.reduce((a,p)=>a+(p._ok?p.pt:0),0);
  const el=document.getElementById('score');if(el)el.innerHTML=`得点 <b>${got}</b> / 100`;
  return got;
}
function test(i){
  stopTimer();HOME.hidden=false;
  const u=U[i],uid='t'+i;FLAT[uid]={};
  let h=`<div class="bar"><span class="tmr" id="tmr">${u.test.min}:00</span>
    <span class="sc" id="score">得点 <b>–</b> / 100</span><span style="flex:1"></span>
    <button class="submit" onclick="submitTest(${i})">採点する</button></div>
    <h2 style="margin:4px 0 14px">${u.code}　${u.name}　模擬テスト <span style="font-size:13px;color:var(--sub)">（${u.test.min}分・100点満点）</span></h2>`;
  u.test.p.forEach((p,n)=>{FLAT[uid][n]=p;p._ok=false;h+=probHTML(uid,n,p,'大問'+(n+1),true);});
  recIdx=null;
  h+=`<div id="res"></div>`;
  V.innerHTML=h;window.scrollTo(0,0);
  let sec=u.test.min*60;const t=document.getElementById('tmr');
  timerId=setInterval(()=>{sec--;if(sec<0){t.textContent='時間切れ';t.classList.add('low');stopTimer();return;}
    t.textContent=Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0');
    if(sec<300)t.classList.add('low');},1000);
}
function submitTest(i){
  const uid='t'+i,u=U[i];
  u.test.p.forEach((p,n)=>grade(uid,n));
  const got=updateScore(uid);
  stopTimer();
  const best=Math.max(got,+(localStorage.getItem('best'+u.code)||0));
  localStorage.setItem('best'+u.code,best);
  logTest(u.code,got);
  document.getElementById('res').innerHTML=`<div class="resultbox">
    <div class="lbl">${u.code} ${u.name}　模擬テスト</div>
    <div class="big">${got}<span style="font-size:20px;color:var(--sub)"> / 100点</span></div>
    <div class="lbl">これまでの最高点：${best}点　（成績は「学習記録」に保存しました）</div></div>`;
  document.getElementById('res').scrollIntoView({behavior:'smooth'});
}
home();
</script>
